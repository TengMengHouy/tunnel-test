server:
  port: 8081

spring:
  application:
    name: stadoor-gateway-server
  cloud:
    gateway:
      # No static routes — all routing is handled by TunnelRoutingFilter
      routes: []

stadoor:
  tunnel-server:
    url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
