databaseChangeLog:
  - changeSet:
      id: 001-init
      author: stadoor
      changes:
        - createTable:
            tableName: tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - createTable:
            tableName: sessions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_sessions_token
                    references: tokens(id)
              - column:
                  name: subdomain
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: assigned_port
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: connected_at
                  type: timestamp
                  defaultValueComputed: now()
              - column:
                  name: disconnected_at
                  type: timestamp
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
